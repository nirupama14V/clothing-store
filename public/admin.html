<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f1f1;
      padding: 2rem;
    }
    h2 {
      color: #333;
    }
    .user-list {
      margin-top: 2rem;
      background: #fff;
      padding: 1rem;
      border-radius: 10px;
    }
    .user {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>Admin Panel - Registered Users</h2>
  <div class="user-list" id="userList"></div>

  <script>
    const users = JSON.parse(localStorage.getItem("users")) || [];
    const listDiv = document.getElementById("userList");

    if (users.length === 0) {
      listDiv.innerHTML = "<p>No registered users found.</p>";
    } else {
      users.forEach((u) => {
        const div = document.createElement("div");
        div.className = "user";
        div.textContent = `Name: ${u.name} | Email: ${u.email}`;
        listDiv.appendChild(div);
      });
    }
    auth.onAuthStateChanged(async user => {
  if (!user || user.email !== "admin@gmail.com") {
    alert("Unauthorized");
    return window.location.href = "login.html";
  }

  const listDiv = document.getElementById("userList");
  const users = await firebase.firestore().collection("users").get();
  listDiv.innerHTML = users.docs.length
    ? users.docs.map(doc => `<div>Name: ${doc.data().name} | Email: ${doc.data().email}</div>`).join("")
    : "<p>No users found</p>";
});

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #c68888;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #bfedb0;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 10px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .delete-btn {
      background: #dc3545;
      color: #fff;
    }
    .delete-btn:hover {
      background: #c82333;
    }
    .logout-btn {
      margin-top: 20px;
      background: #6c757d;
      color: #fff;
      width: 100%;
    }
    .logout-btn:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Panel</h1>
    <h3>Registered Users</h3>
    <table id="userTable">
      <thead>
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script>
    // Load users from localStorage
    function loadUsers() {
      let users = JSON.parse(localStorage.getItem("users")) || [];
      let tbody = document.querySelector("#userTable tbody");
      tbody.innerHTML = "";

      users.forEach((u, index) => {
        let row = `
          <tr>
            <td>${u.username}</td>
            <td>${u.role}</td>
            <td><button class="delete-btn" onclick="deleteUser(${index})">Delete</button></td>
          </tr>`;
        tbody.innerHTML += row;
      });
    }

    // Delete user by index
    function deleteUser(index) {
      let users = JSON.parse(localStorage.getItem("users")) || [];
      if(confirm(`Are you sure you want to delete "${users[index].username}"?`)) {
        users.splice(index, 1);
        localStorage.setItem("users", JSON.stringify(users));
        loadUsers();
        alert("User deleted successfully!");
      }
    }

    // Logout function
    function logout() {
      alert("Logged out successfully!");
      window.location.href = "reg.html";
    }

    loadUsers();
  </script>
</body>
</html>
